<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watch Animation</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Outfit:wght@200;300;400&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: auto;
        }

        body {
            background: #000;
            overflow-x: hidden;
        }

        /* ============================================================
       PRELOADER
    ============================================================ */
        #preloader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            transition: opacity 0.9s ease, visibility 0.9s ease;
        }

        #preloader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .pre-pct {
            font: 300 36px/1 'Segoe UI', sans-serif;
            color: #fff;
            letter-spacing: 4px;
        }

        .pre-bar-wrap {
            width: 280px;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .pre-bar {
            height: 100%;
            width: 0%;
            background: #fff;
            transition: width 0.06s linear;
        }

        .pre-label {
            font: 400 11px/1 'Segoe UI', sans-serif;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ============================================================
       PIN SECTION
       — This element is EXACTLY as tall as the scroll distance we want.
       — The inner .pin-canvas is sticky so it stays on screen.
    ============================================================ */
        #pin-section {
            /* 
        Height = how much scroll distance drives the animation.
        600vh means the user must scroll 5 × viewport-height (the
        sticky panel occupies 1 × viewport-height of that).
      */
            position: relative;
            width: 100%;
            height: 600vh;
        }

        .pin-canvas {
            position: sticky;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* ============================================================
       HERO OVERLAY
       Sits on top of the canvas inside the sticky wrapper.
       Opacity is driven by scroll progress (0 → 0.30 = fade out).
    ============================================================ */
        #hero-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            /* start fully visible; JS will set opacity based on scroll */
            opacity: 1;
            /* NO CSS transition — we update opacity directly each frame
         for perfect scroll-sync (no easing lag from CSS) */
            pointer-events: none;
            text-align: center;
            padding: 0 24px;
            /* subtle vignette so text reads over any background frame */
            background: radial-gradient(ellipse 70% 60% at 50% 50%,
                    rgba(0, 0, 0, 0.35) 0%,
                    transparent 100%);
        }

        .hero-eyebrow {
            font: 300 11px/1 'Outfit', sans-serif;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.55);
            /* entrance animation — plays once on load */
            animation: heroFadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.2s;
        }

        .hero-heading {
            font: 300 clamp(42px, 7vw, 96px)/1.05 'Cormorant Garamond', serif;
            color: #fff;
            letter-spacing: 0.04em;
            text-shadow: 0 4px 40px rgba(0, 0, 0, 0.6);
            /* italic variant for the word "Redefined" */
            animation: heroFadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.45s;
        }

        .hero-heading em {
            font-style: italic;
            font-weight: 300;
            /* very subtle blue-gold shimmer */
            background: linear-gradient(120deg, #ffffff 0%, #d4af37 60%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Thin 1-px gold rule between heading and subheading */
        .hero-rule {
            width: 48px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #d4af37, transparent);
            animation: heroFadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.65s;
        }

        .hero-sub {
            font: 200 clamp(13px, 1.6vw, 18px)/1.6 'Outfit', sans-serif;
            color: rgba(255, 255, 255, 0.65);
            letter-spacing: 0.12em;
            max-width: 520px;
            animation: heroFadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 0.8s;
        }

        /* Scroll-hint arrow */
        .hero-scroll-hint {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            animation: heroFadeUp 1.4s cubic-bezier(0.22, 1, 0.36, 1) both;
            animation-delay: 1.1s;
        }

        .hero-scroll-hint span {
            font: 300 9px/1 'Outfit', sans-serif;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.35);
        }

        .scroll-arrow {
            width: 16px;
            height: 26px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 8px;
            position: relative;
        }

        .scroll-arrow::after {
            content: '';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 3px;
            height: 6px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 2px;
            animation: scrollDot 2s ease-in-out infinite;
        }

        @keyframes scrollDot {
            0% {
                top: 5px;
                opacity: 1;
            }

            60% {
                top: 14px;
                opacity: 0.2;
            }

            100% {
                top: 5px;
                opacity: 1;
            }
        }

        @keyframes heroFadeUp {
            from {
                opacity: 0;
                transform: translateY(28px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================================
       PROGRESS BAR (bottom of screen — optional visual feedback)
    ============================================================ */
        #progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 2px;
            width: 0%;
            background: rgba(255, 255, 255, 0.5);
            z-index: 100;
            pointer-events: none;
            transition: width 0.05s linear;
        }
    </style>
</head>

<body>

    <!-- Preloader -->
    <div id="preloader">
        <div class="pre-pct" id="pre-pct">0%</div>
        <div class="pre-bar-wrap">
            <div class="pre-bar" id="pre-bar"></div>
        </div>
        <div class="pre-label">Loading frames</div>
    </div>

    <!-- Pin Section: tall scroll area with sticky canvas inside -->
    <div id="pin-section">
        <div class="pin-canvas">
            <canvas id="c"></canvas>

            <!-- Hero overlay: fades out over first 30% of scroll animation -->
            <div id="hero-overlay">
                <p class="hero-eyebrow">Swiss Haute Horlogerie</p>
                <h1 class="hero-heading">Time <em>Redefined</em></h1>
                <div class="hero-rule"></div>
                <p class="hero-sub">Crafted for Those Who Value Every Second</p>

                <!-- Scroll hint fades with the overlay -->
                <div class="hero-scroll-hint">
                    <span>Scroll</span>
                    <div class="scroll-arrow"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Optional: progress indicator at bottom of screen -->
    <div id="progress-bar"></div>

    <script>
        'use strict';

        /* ── Config ─────────────────────────────────────────────── */
        const TOTAL = 240;
        const DIR = 'public/frames/';
        const PREFIX = 'ezgif-frame-';
        const EXT = '.jpg';
        const LERP = 0.12;   // chase speed — 0.05 = slow/buttery, 0.18 = snappy

        /* ── DOM ─────────────────────────────────────────────────── */
        const preloader = document.getElementById('preloader');
        const preBar = document.getElementById('pre-bar');
        const prePct = document.getElementById('pre-pct');
        const pinSection = document.getElementById('pin-section');
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const progressBar = document.getElementById('progress-bar');
        const heroOverlay = document.getElementById('hero-overlay');

        /* Hero fade window: 0 → HERO_FADE_END of progress = fully visible → invisible */
        const HERO_FADE_END = 0.30;

        /* ── State ───────────────────────────────────────────────── */
        const imgs = [];
        let loaded = 0;
        let current = 0;   // rendered frame index (float, lerped)
        let target = 0;   // desired frame index from scroll

        /* ── 1. Preload all frames ───────────────────────────────── */
        for (let i = 0; i < TOTAL; i++) {
            const img = new Image();
            img.src = `${DIR}${PREFIX}${String(i + 1).padStart(3, '0')}${EXT}`;
            imgs.push(img);

            img.onload = img.onerror = () => {
                loaded++;
                const pct = Math.round((loaded / TOTAL) * 100);
                preBar.style.width = pct + '%';
                prePct.textContent = pct + '%';
                if (loaded === TOTAL) start();
            };
        }

        /* ── 2. Kick off after load ──────────────────────────────── */
        function start() {
            setTimeout(() => {
                preloader.classList.add('hidden');
                resize();
                tick();
            }, 400);
        }

        /* ── 3. Draw one frame with CSS-cover behaviour ──────────── */
        function drawFrame(idx) {
            idx = Math.round(Math.max(0, Math.min(TOTAL - 1, idx)));
            const img = imgs[idx];
            if (!img || !img.naturalWidth) return;

            const cw = canvas.width, ch = canvas.height;
            const iw = img.naturalWidth, ih = img.naturalHeight;

            // "cover": scale so image fills the canvas
            const scale = Math.max(cw / iw, ch / ih);
            const dw = iw * scale, dh = ih * scale;
            const dx = (cw - dw) / 2, dy = (ch - dh) / 2;

            ctx.clearRect(0, 0, cw, ch);
            ctx.drawImage(img, dx, dy, dw, dh);
        }

        /* ── 4. rAF render loop ──────────────────────────────────── */
        function tick() {
            requestAnimationFrame(tick);

            // LERP current toward target
            current += (target - current) * LERP;

            drawFrame(current);
        }

        /* ── 5. Scroll → target frame ────────────────────────────── */
        function onScroll() {
            /*
              We want progress = 0 when the TOP of #pin-section enters the
              viewport and progress = 1 when the BOTTOM of #pin-section
              leaves the viewport (minus one vh for the sticky panel).
      
              offsetTop           → distance from top of document
              pinSection.offsetHeight → total height of the section (600vh)
              window.innerHeight  → height of viewport
      
              scrollable distance inside section = sectionH - viewH
              progress = (scrollY - sectionTop) / scrollable
            */
            const sectionTop = pinSection.offsetTop;
            const sectionH = pinSection.offsetHeight;
            const viewH = window.innerHeight;

            const scrollable = sectionH - viewH;         // e.g. 500vh in pixels
            const scrolled = window.scrollY - sectionTop; // how far into section

            const progress = Math.min(1, Math.max(0, scrolled / scrollable));

            target = progress * (TOTAL - 1);             // map 0‥1 → 0‥239

            // update thin progress bar at bottom
            progressBar.style.width = (progress * 100).toFixed(2) + '%';

            // ── Hero overlay fade (scroll-synced, no CSS transition lag) ──
            // 0 → HERO_FADE_END: linearly fade from 1 → 0
            // past HERO_FADE_END: fully hidden (opacity 0)
            const heroOpacity = progress <= HERO_FADE_END
                ? 1 - (progress / HERO_FADE_END)
                : 0;
            heroOverlay.style.opacity = heroOpacity.toFixed(4);
            // hide from pointer events once almost invisible
            heroOverlay.style.pointerEvents = heroOpacity < 0.05 ? 'none' : 'none';
        }

        window.addEventListener('scroll', onScroll, { passive: true });

        /* ── 6. Resize: set canvas pixel dimensions ──────────────── */
        function resize() {
            const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap at 2× for perf
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            drawFrame(Math.round(current));
        }

        window.addEventListener('resize', () => {
            resize();
            onScroll(); // recalculate offsets after resize
        });
    </script>
</body>

</html>
